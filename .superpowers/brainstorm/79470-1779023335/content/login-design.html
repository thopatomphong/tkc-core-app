<div class="mockup">
  <div class="mockup-header">Login Screen Design</div>
  <div class="mockup-body" style="background: #FFFFFF; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;">
    
    <!-- Logo Section -->
    <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #4285F4 0%, #34A853 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
      </svg>
    </div>

    <!-- Title Section -->
    <h2 style="font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 28px; color: #1A1A1A; margin: 0; text-align: center;">Mock Mail</h2>
    <p style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; color: #888888; margin-top: 8px; margin-bottom: 40px; text-align: center;">Mail Service & Mini Apps</p>

    <!-- Form Section -->
    <div style="width: 100%; max-width: 337px;">
      
      <!-- Username Field -->
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #555555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Username</label>
        <div style="width: 100%; height: 52px; background: #FAFAFA; border: 1px solid #E0E0E0; border-radius: 12px; display: flex; align-items: center; padding: 0 16px; box-sizing: border-box;">
          <span style="color: #BBBBBB; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px;">user1</span>
        </div>
      </div>

      <!-- Password Field -->
      <div style="margin-bottom: 32px;">
        <label style="display: block; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #555555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Password</label>
        <div style="width: 100%; height: 52px; background: #FAFAFA; border: 1px solid #E0E0E0; border-radius: 12px; display: flex; align-items: center; padding: 0 16px; box-sizing: border-box;">
          <span style="color: #BBBBBB; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px;">••••••••</span>
        </div>
      </div>

      <!-- Sign In Button -->
      <div style="width: 100%; height: 53px; background: linear-gradient(135deg, #EA4335 0%, #C5221F 100%); border-radius: 12px; box-shadow: 0px 4px 16px rgba(234, 67, 53, 0.3); display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <span style="color: #FFFFFF; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; font-size: 17px;">Sign In</span>
      </div>

    </div>
  </div>
</div>

<div class="options">
  <div class="option" data-choice="approve" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Approve Design</h3>
      <p>Proceed with implementation using these styles.</p>
    </div>
  </div>
  <div class="option" data-choice="modify" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Request Changes</h3>
      <p>I'll provide feedback in the terminal.</p>
    </div>
  </div>
</div>
