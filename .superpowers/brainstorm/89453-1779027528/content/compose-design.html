<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose Email Redesign</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-weight: 600;
            font-size: 14px;
        }
        .header {
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #eee;
        }
        .header .cancel {
            color: #ff3b30;
            text-decoration: none;
            font-size: 17px;
        }
        .header .title {
            font-weight: bold;
            font-size: 17px;
        }
        .header .send-btn {
            background-color: #e53935;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        .field {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .field label {
            color: #8e8e93;
            width: 60px;
            font-size: 16px;
        }
        .recipient-chip {
            background-color: #eef2f7;
            padding: 4px 12px 4px 4px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }
        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background-color: #4a90e2;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }
        .subject-text {
            color: #333;
            font-size: 16px;
        }
        .body-area {
            flex: 1;
            padding: 16px;
            font-size: 17px;
            line-height: 1.5;
            color: #333;
        }
        .toolbar {
            height: 44px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 24px;
            color: #8e8e93;
        }
        .keyboard {
            background-color: #d1d3d9;
            height: 290px;
            padding: 8px;
        }
        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .key {
            background-color: white;
            height: 42px;
            border-radius: 5px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            flex: 1;
        }
        .key.wide { flex: 1.5; background-color: #abb1bd; }
        .key.space { flex: 5; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●●● WiFi</span>
        </div>
        <div class="header">
            <a href="#" class="cancel">&lt; Cancel</a>
            <span class="title">New Email</span>
            <div class="send-btn">
                <span>➤</span> Send
            </div>
        </div>
        <div class="field">
            <label>To:</label>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <div class="recipient-chip">
                    <div class="avatar">U2</div>
                    <span>user2</span>
                </div>
                <div class="recipient-chip">
                    <div class="avatar" style="background-color: #34c759;">A1</div>
                    <span>alice</span>
                </div>
            </div>
        </div>
        <div class="field">
            <label>Subject:</label>
            <span class="subject-text">Hey! Are you free tonight?</span>
        </div>
        <div class="body-area">
            Hi user2,<br><br>
            I just booked 2 tickets for the BLACKPINK concert. Do you want to go together?<br>
            Let me know!
        </div>
        <div id="formatting-bar" style="height: 44px; border-top: 1px solid #eee; display: flex; align-items: center; padding: 0 16px; gap: 20px; background-color: #fafafa; font-weight: bold; font-size: 18px; color: #333;">
            <span>B</span>
            <span style="font-style: italic;">I</span>
            <span style="text-decoration: underline;">U</span>
            <span>•≡</span>
        </div>
        <div class="toolbar">
            <span style="color: #007aff;">𝕋</span>
            <span>📞</span>
            <span>💬</span>
        </div>
        <div class="keyboard">
            <div class="key-row">
                <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
                <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
            </div>
            <div class="key-row" style="padding: 0 15px;">
                <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
                <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
            </div>
            <div class="key-row">
                <div class="key wide">⇧</div>
                <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div>
                <div class="key">N</div><div class="key">M</div>
                <div class="key wide">⌫</div>
            </div>
            <div class="key-row">
                <div class="key wide">123</div>
                <div class="key">🌐</div>
                <div class="key space">space</div>
                <div class="key wide">return</div>
            </div>
        </div>
    </div>
</body>
</html>
